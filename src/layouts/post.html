<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} — Sergio Valverde</title>
  <link rel="stylesheet" href="/blog/css/blog.css">
</head>
<body>
  <header class="post-header">
    <a href="/blog/" class="back-link">← Back to all posts</a>
  </header>
  <main class="post-main">
    <article>
      <header class="post-header-content">
        <span class="featured-tag {{TAG_CLS}}">{{TAG_LABEL}}</span>
        <h1>{{TITLE}}</h1>
        <div class="meta">
          <span>Sergio Valverde</span>
          <span class="meta-dot"></span>
          <span>{{DATE}}</span>
          {{#READING_TIME}}<span class="meta-dot"></span><span>{{READING_TIME}} min read</span>{{/READING_TIME}}
        </div>
      </header>
      <div class="article-body">{{BODY}}</div>
    </article>
  </main>
  <footer class="post-footer">
    <a href="/blog/">← Back to all posts</a>
  </footer>
</body>
</html>
